<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat 💬 (Sesli & Görüntülü)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
<style>
:root{--bg:#0f0e17;--surface:#1a1927;--card:#22213a;--accent:#ff6b35;--accent2:#7b5ea7;--accent3:#3ecfcf;--text:#fffffe;--muted:#a7a9be;--border:#2e2d4a;--owner:#ffd700;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

@media (max-width: 768px) {
  .sidebar { position: fixed; left: -240px; top: 56px; bottom: 0; z-index: 100; transition: left 0.3s ease; width: 240px !important; background: var(--surface); }
  .sidebar.open { left: 0; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
  .sidebar-overlay.show { display: block; }
  .chat-area { width: 100%; }
  .msg-bubble { max-width: 85% !important; }
  .header-logo { font-size: 1.1rem; }
  .user-chip { padding: 4px 8px; }
  .chip-pp { width: 24px; height: 24px; }
  .mobile-menu-btn { display: flex !important; }
}

.mobile-menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; margin-right: 10px; }

.voice-rooms-section { padding: 12px; border-top: 1px solid var(--border); margin-top: auto; }
.voice-room-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: var(--muted); font-weight: 700; font-size: 0.85rem; }
.voice-room-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.voice-room-item.active { background: rgba(62, 207, 207, 0.1); color: var(--accent3); }
.voice-room-icon { font-size: 1.1rem; }

#videoGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 10px; background: var(--surface); border-top: 2px solid var(--border); max-height: 300px; overflow-y: auto; display: none; }
#videoGrid.active { display: grid; }
.video-container { position: relative; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border); }
.video-container video { width: 100%; height: 100%; object-fit: cover; }
.video-label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }

.voice-controls { display: flex; align-items: center; justify-content: center; gap: 15px; padding: 10px; background: var(--card); border-top: 1px solid var(--border); display: none; }
.voice-controls.active { display: flex; }
.v-ctrl-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; background: var(--surface); color: var(--text); }
.v-ctrl-btn:hover { transform: scale(1.1); }
.v-ctrl-btn.off { background: #ef476f; color: #fff; }
.v-ctrl-btn.leave { background: #ef476f; color: #fff; width: auto; padding: 0 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }

#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;overflow-y:auto;padding:20px 0;}
.login-box{background:var(--surface);border:2px solid var(--border);border-radius:24px;padding:32px 28px;width:min(440px,94vw);text-align:center;position:relative;overflow:hidden;margin:auto;}
#app{display:none;flex-direction:column;height:100vh;}
header{background:var(--surface);border-bottom:2px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
.main-layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--surface);border-right:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#messagesContainer{flex:1;overflow-y:auto;padding:13px 16px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;}
.input-area{padding:7px 16px 13px;flex-shrink:0;}
.hidden { display: none !important; }
.msg-bubble { background: var(--card); border: 1.5px solid var(--border); border-radius: 4px 11px 11px 11px; padding: 7px 11px; max-width: 68%; width: fit-content; font-size: 0.88rem; font-weight: 600; margin-bottom: 5px; }
.msg-bubble.own { background: var(--accent); border-color: transparent; border-radius: 11px 4px 11px 11px; color: #fff; margin-left: auto; }
.day-divider { text-align: center; color: var(--muted); font-size: 0.7rem; margin: 10px 0; }
.member-item { padding: 8px; font-size: 0.85rem; color: var(--muted); }
.sidebar-label { font-size: 0.7rem; font-weight: 800; color: var(--muted); margin-bottom: 5px; }
.sidebar-section { padding: 10px; }
.sidebar-divider { height: 1px; background: var(--border); margin: 5px 0; }
.input-box { display: flex; background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 8px; }
#msgInput { flex: 1; background: none; border: none; color: var(--text); outline: none; resize: none; }
.send-btn { background: var(--accent); border: none; color: #fff; padding: 5px 15px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <span class="login-emoji">👋</span>
    <h2 class="login-title">Hoş Geldin!</h2>
    <p class="login-subtitle">Sohbete katılmak için bir isim seç.</p>
    <label class="login-label">Kullanıcı Adı</label>
    <input type="text" id="usernameInput" class="login-input" placeholder="İsim yaz..." maxlength="15">
    <button onclick="login()" class="login-btn">Giriş Yap</button>
  </div>
</div>

<div id="app">
  <header>
    <div style="display:flex; align-items:center;">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="header-logo">Chat <span class="logo-dot"></span></div>
    </div>
    <div class="header-right">
      <div class="online-count"><span class="online-dot"></span> <span id="onlineCountDisplay">0 çevrimiçi</span></div>
      <div class="user-chip">
        <div class="chip-pp" id="headerPP">🧑</div>
        <span id="headerUsername" style="font-weight:800; font-size:0.85rem;">Misafir</span>
      </div>
    </div>
  </header>

  <div class="main-layout">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">KANALLAR</div>
        <div id="channelsList">
          <div class="voice-room-item active"># genel</div>
        </div>
      </div>
      
      <div class="sidebar-divider"></div>
      
      <div class="sidebar-section">
        <div class="sidebar-label">SESLİ ODALAR</div>
        <div id="voiceRoomsList">
          <div class="voice-room-item" onclick="joinVoiceRoom('genel-ses')">
            <span class="voice-room-icon">🔊</span> Genel Sesli
          </div>
          <div class="voice-room-item" onclick="joinVoiceRoom('oyun-odasi')">
            <span class="voice-room-icon">🎮</span> Oyun Odası
          </div>
        </div>
      </div>

      <div class="sidebar-divider"></div>
      
      <div class="sidebar-label" style="padding: 0 12px;">ÜYELER</div>
      <div class="members-list" id="membersList"></div>
    </div>

    <div class="chat-area">
      <div id="videoGrid"></div>
      <div id="messagesContainer">
        <div class="day-divider">Bugün</div>
      </div>
      <div class="voice-controls" id="voiceControls">
        <button class="v-ctrl-btn" id="muteBtn" onclick="toggleMic()">🎤</button>
        <button class="v-ctrl-btn" id="cameraBtn" onclick="toggleCam()">📷</button>
        <button class="v-ctrl-btn leave" onclick="leaveVoiceRoom()">Odadan Ayrıl</button>
      </div>
      <div class="input-area">
        <div class="input-box">
          <textarea id="msgInput" placeholder="Mesaj gönder..." rows="1"></textarea>
          <button class="send-btn" onclick="sendMessage()">🚀</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onValue, remove, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpnXOFauAqnuHrUlNg5WCmNi9FRQ1cgVY",
  authDomain: "my-chat-bdc87.firebaseapp.com",
  databaseURL: "https://my-chat-bdc87-default-rtdb.firebaseio.com",
  projectId: "my-chat-bdc87",
  storageBucket: "my-chat-bdc87.firebasestorage.app",
  messagingSenderId: "614734033121",
  appId: "1:614734033121:web:44b93bb896418f6cbb87a0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;
let currentChannel = 'genel';
let socket;
let localStream;
let peers = {};
let isMicOpen = true;
let isCamOpen = false;

window.login = () => {
  const name = document.getElementById('usernameInput').value.trim();
  if(!name) return alert("İsim yazmalısın!");
  currentUser = { name, role: 'member', ts: Date.now() };
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('headerUsername').textContent = name;
  const onlineRef = ref(db, `online/${name}`);
  set(onlineRef, currentUser);
  onDisconnect(onlineRef).remove();
  initSocket();
  listenMessages();
  listenOnline();
};

window.toggleSidebar = () => {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
};

function initSocket() {
  socket = io();
  socket.on('all-users-in-room', users => {
    users.forEach(userID => {
      const peer = createPeer(userID, socket.id, localStream);
      peers[userID] = peer;
    });
  });
  socket.on('user-joined', payload => {
    const peer = addPeer(payload.signal, payload.callerID, localStream);
    peers[payload.callerID] = peer;
  });
  socket.on('receiving-returned-signal', payload => {
    const item = peers[payload.id];
    if(item) item.signal(payload.signal);
  });
  socket.on('user-left-room', userID => {
    if(peers[userID]) {
      peers[userID].destroy();
      delete peers[userID];
    }
    const video = document.getElementById(userID);
    if(video) video.parentElement.remove();
  });
}

async function joinVoiceRoom(roomId) {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    localStream.getVideoTracks()[0].enabled = false;
    document.getElementById('videoGrid').classList.add('active');
    document.getElementById('voiceControls').classList.add('active');
    addVideoElement('me', localStream, 'Sen');
    socket.emit('join-voice-room', roomId);
  } catch (err) {
    alert("Mikrofon/Kamera izni gerekli!");
    console.error(err);
  }
}

function createPeer(userToSignal, callerID, stream) {
  const peer = new SimplePeer({ initiator: true, trickle: false, stream });
  peer.on('signal', signal => {
    socket.emit('sending-signal', { userToSignal, callerID, signal });
  });
  peer.on('stream', stream => addVideoElement(userToSignal, stream, 'Kullanıcı'));
  return peer;
}

function addPeer(incomingSignal, callerID, stream) {
  const peer = new SimplePeer({ initiator: false, trickle: false, stream });
  peer.on('signal', signal => {
    socket.emit('returning-signal', { signal, callerID });
  });
  peer.on('stream', stream => addVideoElement(callerID, stream, 'Kullanıcı'));
  peer.signal(incomingSignal);
  return peer;
}

function addVideoElement(id, stream, labelText) {
  if(document.getElementById(id)) return;
  const container = document.createElement('div');
  container.className = 'video-container';
  const video = document.createElement('video');
  video.id = id;
  video.srcObject = stream;
  video.autoplay = true;
  video.playsInline = true;
  if(id === 'me') video.muted = true;
  const label = document.createElement('div');
  label.className = 'video-label';
  label.textContent = labelText;
  container.appendChild(video);
  container.appendChild(label);
  document.getElementById('videoGrid').appendChild(container);
}

window.toggleMic = () => {
  isMicOpen = !isMicOpen;
  localStream.getAudioTracks()[0].enabled = isMicOpen;
  document.getElementById('muteBtn').classList.toggle('off', !isMicOpen);
  document.getElementById('muteBtn').textContent = isMicOpen ? '🎤' : '🔇';
};

window.toggleCam = () => {
  isCamOpen = !isCamOpen;
  localStream.getVideoTracks()[0].enabled = isCamOpen;
  document.getElementById('cameraBtn').classList.toggle('off', !isCamOpen);
  document.getElementById('cameraBtn').textContent = isCamOpen ? '📷' : '🚫';
};

window.leaveVoiceRoom = () => {
  socket.emit('leave-voice-room');
  if(localStream) {
    localStream.getTracks().forEach(track => track.stop());
  }
  document.getElementById('videoGrid').innerHTML = '';
  document.getElementById('videoGrid').classList.remove('active');
  document.getElementById('voiceControls').classList.remove('active');
  Object.values(peers).forEach(peer => peer.destroy());
  peers = {};
};

window.sendMessage = () => {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || !currentUser) return;
  push(ref(db, `messages/${currentChannel}`), {
    author: currentUser.name,
    text: text,
    ts: Date.now(),
    type: 'user'
  });
  input.value = '';
};

function listenMessages() {
  onValue(ref(db, `messages/${currentChannel}`), snapshot => {
    const data = snapshot.val();
    const container = document.getElementById('messagesContainer');
    container.innerHTML = '<div class="day-divider">Bugün</div>';
    if(data) {
      Object.values(data).forEach(msg => {
        const div = document.createElement('div');
        div.className = 'msg-bubble' + (msg.author === currentUser.name ? ' own' : '');
        div.innerHTML = `<strong>${msg.author}:</strong> ${msg.text}`;
        container.appendChild(div);
      });
    }
    container.scrollTop = container.scrollHeight;
  });
}

function listenOnline() {
  onValue(ref(db, 'online'), snapshot => {
    const users = snapshot.val() || {};
    document.getElementById('onlineCountDisplay').textContent = `${Object.keys(users).length} çevrimiçi`;
    const list = document.getElementById('membersList');
    list.innerHTML = '';
    Object.values(users).forEach(u => {
      const item = document.createElement('div');
      item.className = 'member-item';
      item.textContent = u.name;
      list.appendChild(item);
    });
  });
}
</script>
</body>
</html>
