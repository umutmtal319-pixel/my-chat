<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat 💬</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<!-- WebRTC Kütüphaneleri -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
<style>
:root{--bg:#0f0e17;--surface:#1a1927;--card:#22213a;--accent:#ff6b35;--accent2:#7b5ea7;--accent3:#3ecfcf;--text:#fffffe;--muted:#a7a9be;--border:#2e2d4a;--owner:#ffd700;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* --- MOBİL UYUMLULUK EKLEMELERİ --- */
@media (max-width: 768px) {
  body { height: 100dvh; }
  #app { height: 100dvh; }
  .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; z-index: 10000; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 260px !important; background: var(--surface); box-shadow: 20px 0 50px rgba(0,0,0,0.8); height: 100dvh; }
  .sidebar.open { left: 0; }
  #sidebarToggle { display: flex !important; align-items: center; justify-content: center; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; backdrop-filter: blur(4px); }
  .sidebar-overlay.show { display: block; }
  header { height: 50px; padding: 0 10px; gap: 5px; }
  .header-logo { font-size: 1rem; gap: 4px; }
  .logo-dot { width: 6px; height: 6px; }
  .header-right { gap: 5px; }
  .online-count { font-size: 0.7rem; }
  .user-chip { padding: 2px 6px 2px 2px; gap: 4px; max-width: 100px; }
  .user-chip span#headerName { font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip-pp { width: 24px; height: 24px; }
  .role-badge { display: none; }
  .bored-btn { padding: 4px 8px; font-size: 0.75rem; }
  .bored-btn span { display: none; }
  .chat-header { padding: 8px 12px; height: 45px; }
  .chat-header-name { font-size: 0.85rem; }
  .chat-header-desc { display: none; }
  #messagesContainer { padding: 10px 12px; }
  .msg-bubble { max-width: 90% !important; font-size: 0.85rem; padding: 6px 10px; }
  .input-area { padding: 8px 10px; background: var(--bg); position: relative; z-index: 1000; }
  .input-box { padding: 6px 10px; border-radius: 24px; gap: 4px; background: var(--card); border: 2px solid var(--border); display: flex; align-items: center; }
  #msgInput { font-size: 1rem !important; padding: 8px 0; max-height: 100px; flex: 1; background: transparent; border: none; color: var(--text); outline: none; }
  .icon-btn { font-size: 20px; padding: 8px; cursor: pointer; }
  .send-btn { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--accent); }
  #videoGrid { position: absolute; top: 0; left: 0; right: 0; max-height: 200px; z-index: 50; background: rgba(26, 25, 39, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--accent3); grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
  .voice-controls { padding: 8px; gap: 10px; position: relative; z-index: 1001; background: var(--surface); border-top: 1px solid var(--border); }
}

/* --- SESLİ ODA EKLEMELERİ --- */
.voice-room-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: var(--muted); font-weight: 700; font-size: 0.85rem; }
.voice-room-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.voice-room-item.active { background: rgba(62, 207, 207, 0.1); color: var(--accent3); }
#videoGrid { display: none !important; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; padding: 8px; background: var(--surface); border-bottom: 2px solid var(--border); max-height: 250px; overflow-y: auto; z-index: 5; }
#videoGrid.active { display: grid !important; }
.video-container { position: relative; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; border: 1.5px solid var(--border); }
.video-container video { width: 100%; height: 100%; object-fit: cover; }
.video-label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); padding: 1px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; }
.voice-controls { display: none !important; align-items: center; justify-content: center; gap: 12px; padding: 8px; background: var(--card); border-top: 1.5px solid var(--border); z-index: 5; }
.voice-controls.active { display: flex !important; }
.v-ctrl-btn { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; background: var(--surface); color: var(--text); }
.v-ctrl-btn.off { background: #ef476f; color: #fff; }
.v-ctrl-btn.leave { background: #ef476f; color: #fff; width: auto; padding: 0 12px; border-radius: 18px; font-size: 0.75rem; font-weight: 800; }

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;overflow-y:auto;padding:20px 0;}
.login-box{background:var(--surface);border:2px solid var(--border);border-radius:24px;padding:32px 28px;width:min(440px,94vw);text-align:center;position:relative;overflow:hidden;margin:auto;}
.login-box::before{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:radial-gradient(circle,var(--accent2) 0%,transparent 70%);opacity:0.35;pointer-events:none;}
.login-emoji{font-size:48px;display:block;margin-bottom:6px;animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.login-title{font-size:1.7rem;font-weight:900;margin-bottom:3px;letter-spacing:-1px;}
.login-subtitle{color:var(--muted);margin-bottom:18px;font-size:0.86rem;}
.login-label{display:block;text-align:left;font-size:0.7rem;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.login-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:600;outline:none;transition:border-color 0.2s;margin-bottom:11px;}
.login-input:focus{border-color:var(--accent);}

/* PP UPLOAD AREA */
.pp-upload-area{width:100%;background:var(--card);border:2px dashed var(--border);border-radius:14px;padding:16px;margin-bottom:14px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.pp-upload-area:hover{border-color:var(--accent);background:rgba(255,107,53,0.05);}
.pp-upload-area.has-photo{border-style:solid;border-color:var(--accent);}
.pp-preview-big{width:72px;height:72px;border-radius:50%;border:3px solid var(--border);object-fit:cover;font-size:36px;display:flex;align-items:center;justify-content:center;background:var(--surface);overflow:hidden;}
.pp-preview-big img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pp-upload-text{font-size:0.82rem;font-weight:700;color:var(--muted);}
.pp-upload-hint{font-size:0.7rem;color:var(--muted);opacity:0.7;}
#photoFileInput{display:none;}

/* AVATAR PICKER */
.avatar-picker{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.avatar-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--card);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.avatar-btn:hover{transform:scale(1.15);}
.avatar-btn.selected{border-color:var(--accent);background:rgba(255,107,53,0.15);transform:scale(1.1);}
.role-select{display:flex;gap:7px;margin-bottom:11px;}
.role-opt{flex:1;padding:7px;background:var(--card);border:2px solid var(--border);border-radius:9px;cursor:pointer;font-size:0.78rem;font-weight:700;color:var(--muted);text-align:center;transition:all 0.15s;}
.role-opt.selected{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,0.1);}
.owner-code-wrap{display:none;}
.owner-code-wrap.show{display:block;}
.login-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,107,53,0.35);}

/* APP */
#app{display:none;flex-direction:column;height:100vh;}
header{background:var(--surface);border-bottom:2px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
.header-logo{font-size:1.25rem;font-weight:900;letter-spacing:-1px;display:flex;align-items:center;gap:6px;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.8)}}
.header-right{display:flex;align-items:center;gap:7px;}
.online-count{display:flex;align-items:center;gap:5px;font-size:0.78rem;font-weight:700;color:var(--accent3);}
.online-dot{width:7px;height:7px;background:var(--accent3);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:4px 10px 4px 4px;cursor:pointer;transition:border-color 0.2s;}
.user-chip:hover{border-color:var(--accent);}
.chip-pp{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);object-fit:cover;font-size:16px;display:flex;align-items:center;justify-content:center;background:var(--card);overflow:hidden;flex-shrink:0;}
.chip-pp img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.role-badge{font-size:0.58rem;font-weight:800;padding:2px 5px;border-radius:4px;letter-spacing:0.5px;text-transform:uppercase;background:rgba(255,215,0,0.15);color:var(--owner);border:1px solid rgba(255,215,0,0.3);}
.role-badge.member{background:rgba(167,169,190,0.1);color:#a7a9be;border-color:rgba(167,169,190,0.2);}
.bored-btn{display:flex;align-items:center;gap:4px;background:linear-gradient(135deg,#7b5ea7,#3ecfcf);border:none;border-radius:18px;padding:5px 12px;color:#fff;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:800;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
.bored-btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(123,94,167,0.4);}

/* PINNED BAR */
.pinned-bar{background:rgba(255,215,0,0.07);border-bottom:1px solid rgba(255,215,0,0.2);padding:7px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer;}
.pinned-bar:hover{background:rgba(255,215,0,0.12);}
.pinned-icon{font-size:14px;}
.pinned-text{font-size:0.78rem;font-weight:700;color:var(--owner);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pinned-close{font-size:12px;color:var(--muted);cursor:pointer;padding:2px 5px;}

.main-layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-section{padding:12px 12px 4px;}
.sidebar-label{font-size:0.65rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;padding:0 3px;display:flex;align-items:center;justify-content:space-between;}
.add-ch-btn{width:18px;height:18px;background:var(--card);border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);transition:all 0.15s;}
.add-ch-btn:hover{border-color:var(--accent);color:var(--accent);}
.channel-item{display:flex;align-items:center;gap:5px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background 0.15s;font-weight:700;font-size:0.84rem;color:var(--muted);}
.channel-item.active{background:rgba(255,107,53,0.12);color:var(--accent);}
.channel-item:hover:not(.active){background:rgba(255,255,255,0.04);color:var(--text);}
.ch-hash{font-family:'Space Mono',monospace;font-size:0.88rem;opacity:0.7;}
.ch-del{margin-left:auto;opacity:0;font-size:11px;color:#ef476f;transition:opacity 0.15s;}
.channel-item:hover .ch-del{opacity:1;}
.sidebar-divider{height:1px;background:var(--border);margin:5px 12px;}
.members-list{flex:1;overflow-y:auto;padding:0 8px 8px;}
.member-item{display:flex;align-items:center;gap:7px;padding:6px 6px;border-radius:7px;cursor:pointer;transition:background 0.15s;}
.member-item:hover{background:rgba(255,255,255,0.04);}
.member-av-wrap{position:relative;width:28px;height:28px;flex-shrink:0;}
.member-av{width:28px;height:28px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;background:var(--card);overflow:hidden;}
.member-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.m-online-dot{position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;background:var(--accent3);border-radius:50%;border:1.5px solid var(--surface);}
.member-info{flex:1;min-width:0;}
.member-name{font-size:0.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-title-text{font-size:0.6rem;font-weight:700;}
.kick-btn{font-size:11px;color:#ef476f;cursor:pointer;opacity:0;padding:2px 4px;border-radius:4px;transition:opacity 0.15s;}
.member-item:hover .kick-btn{opacity:1;}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.chat-header{padding:11px 16px;border-bottom:2px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.chat-header-hash{font-family:'Space Mono',monospace;font-size:1.05rem;color:var(--accent);}
.chat-header-name{font-weight:800;font-size:0.95rem;}
.chat-header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.chat-header-desc{font-size:0.73rem;color:var(--muted);}
.owner-tools-btn{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.25);border-radius:7px;padding:4px 9px;font-size:0.75rem;font-weight:800;color:var(--owner);cursor:pointer;transition:all 0.15s;}
.owner-tools-btn:hover{background:rgba(255,215,0,0.2);}

#messagesContainer{flex:1;overflow-y:auto;padding:13px 16px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;}
#messagesContainer::-webkit-scrollbar{width:4px;}
#messagesContainer::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.day-divider{display:flex;align-items:center;gap:9px;margin:9px 0 4px;color:var(--muted);font-size:0.68rem;font-weight:700;}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.msg-group{display:flex;flex-direction:column;gap:2px;margin-bottom:5px;}
.msg-group-header{display:flex;align-items:center;gap:7px;margin-bottom:2px;}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:18px;overflow:hidden;background:var(--card);}
.msg-avatar:hover{transform:scale(1.1);}
.msg-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.msg-author{font-weight:800;font-size:0.86rem;cursor:pointer;}
.msg-author:hover{text-decoration:underline;}
.msg-time{font-size:0.67rem;color:var(--muted);font-family:'Space Mono',monospace;}
.msg-title-tag{font-size:0.6rem;font-weight:800;padding:1px 6px;border-radius:4px;margin-left:5px;display:inline-block;animation:titleGlow 2.5s ease-in-out infinite;}
@keyframes titleGlow{0%,100%{filter:brightness(1);box-shadow:0 0 0 rgba(0,0,0,0)}50%{filter:brightness(1.2);box-shadow:0 0 10px rgba(255,255,255,0.2)}}
.msg-bubble{background:var(--surface);border:1.5px solid var(--border);padding:8px 12px;border-radius:0 14px 14px 14px;font-size:0.92rem;line-height:1.5;max-width:75%;width:fit-content;position:relative;transition:transform 0.15s;}
.msg-bubble:hover{transform:translateX(3px);}
.msg-group.own .msg-bubble{background:rgba(255,107,53,0.08);border-color:rgba(255,107,53,0.25);border-radius:14px 0 14px 14px;margin-left:auto;}
.msg-group.own .msg-group-header{flex-direction:row-reverse;}
.msg-text{word-break:break-word;white-space:pre-wrap;}
.msg-img{max-width:300px;max-height:400px;border-radius:12px;margin-top:6px;cursor:zoom-in;border:2px solid var(--border);display:block;}
.msg-poll{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px;margin-top:6px;width:min(300px,100%);}
.poll-q{font-weight:800;font-size:0.88rem;margin-bottom:10px;display:block;}
.poll-opt{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer;font-size:0.82rem;font-weight:700;display:flex;align-items:center;justify-content:space-between;transition:all 0.15s;}
.poll-opt:hover{border-color:var(--accent);background:rgba(255,107,53,0.05);}
.poll-opt.voted{border-color:var(--accent);background:rgba(255,107,53,0.1);}
.poll-bar-bg{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.poll-bar-fill{height:100%;background:var(--accent);transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}

.input-area{padding:16px;background:var(--surface);border-top:2px solid var(--border);flex-shrink:0;}
.input-box{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:8px 12px;display:flex;align-items:flex-end;gap:10px;transition:border-color 0.2s;}
.input-box:focus-within{border-color:var(--accent);}
#msgInput{flex:1;background:none;border:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:600;outline:none;padding:8px 0;resize:none;max-height:150px;min-height:24px;}
.icon-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:6px;border-radius:10px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.send-btn{background:var(--accent);color:#fff;width:40px;height:40px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform 0.15s,box-shadow 0.15s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.05);box-shadow:0 5px 15px rgba(255,107,53,0.3);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:2px solid var(--border);border-radius:24px;padding:28px;width:min(400px,100%);position:relative;animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes modalIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:1.4rem;font-weight:900;margin-bottom:10px;letter-spacing:-0.5px;}
.modal p{color:var(--muted);font-size:0.88rem;margin-bottom:18px;}
.modal-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:600;outline:none;margin-bottom:12px;transition:border-color 0.2s;}
.modal-input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-btn{flex:1;padding:12px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;transition:all 0.15s;border:none;}
.modal-btn.primary{background:var(--accent);color:#fff;}
.modal-btn.secondary{background:var(--card);color:var(--text);border:2px solid var(--border);}
.modal-btn.danger{background:#ef476f;color:#fff;}
.modal-btn:hover{transform:translateY(-2px);filter:brightness(1.1);}

/* EMOJI PICKER */
.emoji-picker{position:absolute;bottom:85px;left:16px;background:var(--surface);border:2px solid var(--border);border-radius:18px;padding:12px;width:280px;display:grid;grid-template-columns:repeat(6,1fr);gap:5px;z-index:1000;box-shadow:0 10px 30px rgba(0,0,0,0.5);animation:emojiIn 0.2s ease-out;}
@keyframes emojiIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.emoji-item{font-size:22px;cursor:pointer;padding:5px;border-radius:8px;text-align:center;transition:transform 0.1s;}
.emoji-item:hover{background:rgba(255,255,255,0.05);transform:scale(1.2);}

/* PROFILE MODAL */
.profile-card{text-align:center;}
.profile-pp-wrap{position:relative;width:100px;height:100px;margin:0 auto 15px;}
.profile-pp{width:100px;height:100px;border-radius:50%;border:4px solid var(--accent);object-fit:cover;font-size:50px;display:flex;align-items:center;justify-content:center;background:var(--card);overflow:hidden;}
.profile-pp img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.profile-name{font-size:1.5rem;font-weight:900;margin-bottom:5px;}
.profile-role{display:inline-block;margin-bottom:15px;}
.profile-bio{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:0.85rem;color:var(--muted);margin-bottom:20px;min-height:60px;word-break:break-word;}

/* UTILS */
.hidden{display:none !important;}
.typing-bar{height:20px;padding:0 16px;margin-bottom:4px;}
#typingIndicator{display:flex;align-items:center;gap:8px;font-size:0.72rem;font-weight:700;color:var(--accent3);}
.typing-dots{display:flex;gap:3px;}
.typing-dots span{width:4px;height:4px;background:var(--accent3);border-radius:50%;animation:typing 1.4s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-4px);opacity:1}}
.slowmode-badge{display:none;align-items:center;gap:4px;background:rgba(62,207,207,0.1);border:1px solid rgba(62,207,207,0.2);padding:2px 7px;border-radius:6px;font-size:0.7rem;font-weight:800;color:var(--accent3);}
.slowmode-badge.active{display:flex;}

/* ATTACH BAR */
.attach-bar{padding:8px 16px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;overflow-x:auto;}
.attach-bar-inner{display:flex;gap:8px;align-items:center;}
.attach-item{position:relative;width:50px;height:50px;border-radius:8px;border:1.5px solid var(--border);overflow:hidden;flex-shrink:0;}
.attach-item img{width:100%;height:100%;object-fit:cover;}
.attach-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;width:16px;height:16px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.attach-bar-send{background:var(--accent3);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:0.75rem;font-weight:800;cursor:pointer;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <span class="login-emoji">👋</span>
    <h2 class="login-title">Hoş Geldin!</h2>
    <p class="login-subtitle">Sohbete katılmak için bir isim seç.</p>
    
    <label class="login-label">Profil Fotoğrafı</label>
    <div class="pp-upload-area" id="ppUploadArea" onclick="document.getElementById('photoFileInput').click()">
      <div class="pp-preview-big" id="ppPreviewBig">🧑</div>
      <div class="pp-upload-text">Fotoğraf Yükle</div>
      <div class="pp-upload-hint">veya aşağıdan bir emoji seç</div>
    </div>
    <input type="file" id="photoFileInput" accept="image/*">
    
    <div class="avatar-picker" id="avatarPicker">
      <button class="avatar-btn" onclick="selectAvatar('🧑')">🧑</button>
      <button class="avatar-btn" onclick="selectAvatar('👧')">👧</button>
      <button class="avatar-btn" onclick="selectAvatar('🧔')">🧔</button>
      <button class="avatar-btn" onclick="selectAvatar('🦊')">🦊</button>
      <button class="avatar-btn" onclick="selectAvatar('🐱')">🐱</button>
      <button class="avatar-btn" onclick="selectAvatar('🐸')">🐸</button>
      <button class="avatar-btn" onclick="selectAvatar('🤖')">🤖</button>
      <button class="avatar-btn" onclick="selectAvatar('👻')">👻</button>
    </div>

    <label class="login-label">Kullanıcı Adı</label>
    <input class="login-input" id="usernameInput" type="text" placeholder="İsim yaz..." maxlength="15">
    
    <label class="login-label">Hakkımda (Bio)</label>
    <input class="login-input" id="bioInput" type="text" placeholder="Kendinden bahset..." maxlength="50">

    <label class="login-label">Rol Seçimi</label>
    <div class="role-select">
      <div class="role-opt selected" id="roleMember" onclick="selectRole('member')">👤 Üye</div>
      <div class="role-opt" id="roleOwner" onclick="selectRole('owner')">👑 Kurucu</div>
    </div>
    
    <div class="owner-code-wrap" id="ownerCodeWrap">
      <label class="login-label">Kurucu Kodu</label>
      <input class="login-input" id="ownerCodeInput" type="password" placeholder="Kodu gir...">
    </div>

    <button class="login-btn" onclick="joinChat()">Sohbete Katıl 🚀</button>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- APP -->
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:9px">
      <button id="sidebarToggle" onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;margin-right:10px;display:none">☰</button>
      <div class="header-logo"><div class="logo-dot"></div>Chat</div>
      <span id="activeChanBadge" style="background:var(--card);border:1.5px solid var(--border);border-radius:6px;padding:3px 9px;font-size:0.73rem;color:var(--muted);font-weight:700;font-family:'Space Mono',monospace">#genel</span>
    </div>
    <div class="header-right">
      <button class="bored-btn" onclick="openBored()">🎲 <span>Sıkıldım</span></button>
      <div class="online-count"><div class="online-dot"></div><span id="onlineCountDisplay">1 çevrimiçi</span></div>
      <div class="user-chip" onclick="openMyProfile()">
        <div class="chip-pp" id="headerPP">🧑</div>
        <span id="headerName" style="font-size:0.79rem;font-weight:700">Sen</span>
        <span class="role-badge member" id="headerRoleBadge">üye</span>
      </div>
    </div>
  </header>

  <div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">KANALLAR <div class="add-ch-btn" onclick="addChannel()">+</div></div>
          <div id="channelsList"></div>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-section">
          <div class="sidebar-label">SESLİ ODALAR</div>
          <div id="voiceRoomsList">
            <div class="voice-room-item" onclick="joinVoiceRoom('genel-ses')"><span>🔊</span> Genel Ses</div>
            <div class="voice-room-item" onclick="joinVoiceRoom('oyun-ses')"><span>🎮</span> Oyun Odası</div>
          </div>
        </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section"><div class="sidebar-label">Çevrimiçi</div></div>
      <div class="members-list" id="membersList"></div>
    </div>

    <div class="chat-area" style="position:relative">
      <div id="videoGrid"></div>
      <div class="chat-header">
        <span class="chat-header-hash">#</span>
        <span class="chat-header-name" id="chatHeaderName">genel</span>
        <div class="chat-header-right">
          <span class="chat-header-desc" id="chatHeaderDesc">Genel sohbet kanalı</span>
          <div class="slowmode-badge" id="slowmodeBadge">🐢 <span id="slowmodeCountdown" class="slowmode-countdown">--</span>s</div>
          <button class="owner-tools-btn hidden" id="ownerToolsBtn" onclick="openOwnerTools()">👑 Araçlar</button>
        </div>
      </div>
      <div class="pinned-bar hidden" id="pinnedBar">
        <span class="pinned-icon">📌</span>
        <span class="pinned-text" id="pinnedText">Sabitlenmiş mesaj</span>
        <span class="pinned-close" onclick="clearPin()">✕</span>
      </div>
      <div id="messagesContainer"><div class="day-divider">Bugün</div></div>
      <div class="typing-bar">
        <div id="typingIndicator" class="hidden">
          <div class="typing-dots"><span></span><span></span><span></span></div>
          <span class="typing-text" id="typingText"></span>
        </div>
      </div>
      <div class="attach-bar hidden" id="attachBar"><div class="attach-bar-inner" id="attachBarInner"><button class="attach-bar-send" onclick="sendAttachments()">📤 Gönder</button></div></div>
      
      <div id="voiceControls" class="voice-controls">
        <button class="v-ctrl-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        <button class="v-ctrl-btn" id="cameraBtn" onclick="toggleCamera()">🚫</button>
        <button class="v-ctrl-btn leave" onclick="leaveVoiceRoom()">Ayrıl</button>
      </div>

      <div class="input-area">
        <div class="input-box">
          <button class="icon-btn" onclick="toggleEmojiPicker()">😊</button>
          <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
          <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
          <textarea id="msgInput" placeholder="Mesaj gönder..." rows="1"></textarea>
          <button class="icon-btn" onclick="openPollModal()">📊</button>
          <button class="send-btn" onclick="sendMessage()">🚀</button>
        </div>
        <div class="emoji-picker hidden" id="emojiPicker"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

<script type="module">
  // --- WebRTC & Mobil Mantığı ---
  let socket;
  let localStream;
  let peers = {};
  let isMicOpen = true;
  let isCamOpen = false;

  window.toggleSidebar = function() {
    const sb = document.querySelector('.sidebar');
    const ov = document.getElementById('sidebarOverlay');
    sb.classList.toggle('open');
    ov.classList.toggle('show');
  }

  function initSocket() {
    socket = io('https://your-signaling-server.com'); // Buraya kendi sunucu adresini yazmalısın
    socket.on('user-joined', async (userId) => {
      const peer = createPeer(userId, socket.id, localStream);
      peers[userId] = peer;
    });
    socket.on('signal', (data) => {
      const peer = peers[data.from];
      if(peer) peer.signal(data.signal);
    });
  }

  window.joinVoiceRoom = async (roomId) => {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      localStream.getVideoTracks()[0].enabled = false;
      const vg = document.getElementById('videoGrid');
      vg.classList.add('active');
      document.getElementById('voiceControls').classList.add('active');
      if(window.innerWidth <= 768) {
        document.getElementById('messagesContainer').style.paddingTop = (vg.offsetHeight || 180) + 'px';
      }
      addVideoElement('me', localStream, 'Sen');
      if(!socket) initSocket();
      socket.emit('join-voice-room', roomId);
    } catch (err) {
      alert("Mikrofon/Kamera izni gerekli!");
    }
  };

  function addVideoElement(id, stream, labelText) {
    const grid = document.getElementById('videoGrid');
    const cont = document.createElement('div');
    cont.className = 'video-container';
    cont.id = 'video-' + id;
    const video = document.createElement('video');
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;
    if(id === 'me') video.muted = true;
    const label = document.createElement('div');
    label.className = 'video-label';
    label.textContent = labelText;
    cont.append(video, label);
    grid.append(cont);
  }

  window.toggleMic = () => {
    isMicOpen = !isMicOpen;
    localStream.getAudioTracks()[0].enabled = isMicOpen;
    document.getElementById('micBtn').classList.toggle('off', !isMicOpen);
    document.getElementById('micBtn').textContent = isMicOpen ? '🎤' : '🔇';
  };

  window.toggleCamera = () => {
    isCamOpen = !isCamOpen;
    localStream.getVideoTracks()[0].enabled = isCamOpen;
    document.getElementById('cameraBtn').classList.toggle('off', !isCamOpen);
    document.getElementById('cameraBtn').textContent = isCamOpen ? '📷' : '🚫';
  };

  window.leaveVoiceRoom = () => {
    if(socket) socket.emit('leave-voice-room');
    if(localStream) localStream.getTracks().forEach(t => t.stop());
    const vg = document.getElementById('videoGrid');
    vg.innerHTML = '';
    vg.classList.remove('active');
    document.getElementById('voiceControls').classList.remove('active');
    if(window.innerWidth <= 768) document.getElementById('messagesContainer').style.paddingTop = '10px';
    Object.values(peers).forEach(p => p.destroy());
    peers = {};
  };

  // --- FIREBASE CONFIG ---
  const firebaseConfig = {
    apiKey: "AIzaSyAs-K7m9W8_X7X7X7X7X7X7X7X7X7X7X7",
    authDomain: "umutmtal-chat.firebaseapp.com",
    databaseURL: "https://umutmtal-chat-default-rtdb.firebaseio.com",
    projectId: "umutmtal-chat",
    storageBucket: "umutmtal-chat.appspot.com",
    messagingSenderId: "1234567890",
    appId: "1:1234567890:web:abcdef1234567890"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const storage = firebase.storage();
  const { ref, set, push, onValue, onChildAdded, remove, update, get, serverTimestamp } = firebase.database;

  // --- APP LOGIC ---
  let currentUser = null;
  let currentChannel = 'genel';
  let selectedAvatar = '🧑';
  let selectedRole = 'member';
  let typingTimer;
  let attachments = [];
  const OWNER_CODE = "3169";
  const EMOJIS = ['😊','😂','😍','🤔','😎','🔥','✨','🙌','👍','❤️','🎉','🚀','💀','🤡','💩','👀','🌈','🍕','🎮','🎵'];
  const FUN_LINKS = ["https://poki.com","https://skribbl.io","https://agar.io","https://slither.io"];

  // --- LOGIN ---
  window.selectAvatar = (emoji) => {
    selectedAvatar = emoji;
    document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
    event.target.classList.add('selected');
    document.getElementById('ppPreviewBig').textContent = emoji;
    loginPhotoData = null;
    document.getElementById('ppUploadArea').classList.remove('has-photo');
  };

  window.selectRole = (role) => {
    selectedRole = role;
    document.getElementById('roleMember').classList.toggle('selected', role==='member');
    document.getElementById('roleOwner').classList.toggle('selected', role==='owner');
    document.getElementById('ownerCodeWrap').classList.toggle('show', role==='owner');
  };

  document.getElementById('photoFileInput').onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      loginPhotoData = ev.target.result;
      document.getElementById('ppPreviewBig').innerHTML = `<img src="${loginPhotoData}">`;
      document.getElementById('ppUploadArea').classList.add('has-photo');
    };
    reader.readAsDataURL(file);
  };

  window.joinChat = () => {
    const name = document.getElementById('usernameInput').value.trim();
    const bio = document.getElementById('bioInput').value.trim() || "Harika bir sohbetçi!";
    if(!name) return alert("Lütfen bir isim gir!");
    if(selectedRole === 'owner' && document.getElementById('ownerCodeInput').value !== OWNER_CODE) return alert("Hatalı kurucu kodu!");
    
    currentUser = { name, bio, avatar: selectedAvatar, photo: loginPhotoData, role: selectedRole, id: 'u_' + Date.now() };
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('headerName').textContent = name;
    document.getElementById('headerPP').innerHTML = loginPhotoData ? `<img src="${loginPhotoData}">` : selectedAvatar;
    document.getElementById('headerRoleBadge').textContent = selectedRole === 'owner' ? 'kurucu' : 'üye';
    document.getElementById('headerRoleBadge').className = 'role-badge ' + selectedRole;
    if(selectedRole === 'owner') document.getElementById('ownerToolsBtn').classList.remove('hidden');
    
    myOnlineRef = ref(db, `online/${currentUser.id}`);
    set(myOnlineRef, currentUser);
    setupInput();
    initEmojiPicker();
  };

  // --- CHANNELS ---
  function listenChannels() {
    onValue(ref(db, 'channels'), snap => {
      const list = document.getElementById('channelsList');
      list.innerHTML = '';
      const data = snap.val() || { 'genel': { name: 'genel', desc: 'Genel sohbet kanalı' } };
      Object.entries(data).forEach(([id, ch]) => {
        const div = document.createElement('div');
        div.className = `channel-item ${currentChannel === id ? 'active' : ''}`;
        div.onclick = () => switchChannel(id, ch.name, ch.desc);
        div.innerHTML = `<span class="ch-hash">#</span> ${ch.name} ${currentUser?.role==='owner' && id!=='genel' ? `<span class="ch-del" onclick="event.stopPropagation();deleteChannel('${id}','${ch.name}')">✕</span>` : ''}`;
        list.appendChild(div);
      });
    });
  }

  window.switchChannel = (id, name, desc) => {
    currentChannel = id;
    document.getElementById('chatHeaderName').textContent = name;
    document.getElementById('chatHeaderDesc').textContent = desc;
    document.getElementById('activeChanBadge').textContent = '#' + name;
    listenMessages();
    listenTyping();
    listenSlowMode();
    listenPinned();
    if(window.innerWidth <= 768) toggleSidebar();
  };

  window.addChannel = () => {
    if(currentUser?.role !== 'owner') return alert("Sadece kurucular kanal ekleyebilir!");
    showModal('addChannelModal');
  };

  // --- MESSAGES ---
  function listenMessages() {
    const container = document.getElementById('messagesContainer');
    onValue(ref(db, `messages/${currentChannel}`), snap => {
      container.innerHTML = '';
      const data = snap.val();
      if(!data) return;
      let lastAuthor = null;
      let lastTime = null;
      Object.values(data).forEach(msg => {
        const date = new Date(msg.ts);
        const timeStr = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
        const isNewGroup = lastAuthor !== msg.author.id || (msg.ts - lastTime > 300000);
        
        if(isNewGroup) {
          const group = document.createElement('div');
          group.className = `msg-group ${msg.author.id === currentUser.id ? 'own' : ''}`;
          group.innerHTML = `
            <div class="msg-group-header">
              <div class="msg-avatar" onclick="openProfile('${msg.author.id}')">${msg.author.photo ? `<img src="${msg.author.photo}">` : msg.author.avatar}</div>
              <span class="msg-author" onclick="openProfile('${msg.author.id}')" style="color:${getColor(msg.author.name)}">${msg.author.name}</span>
              <span class="msg-time">${timeStr}</span>
              ${msg.author.role === 'owner' ? '<span class="msg-title-tag" style="background:var(--owner);color:#000">KURUCU</span>' : ''}
            </div>
          `;
          container.appendChild(group);
          lastAuthor = msg.author.id;
        }
        
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        if(msg.type === 'text') {
          bubble.innerHTML = `<div class="msg-text">${formatText(msg.text)}</div>`;
        } else if(msg.type === 'image') {
          bubble.innerHTML = `<img src="${msg.url}" class="msg-img" onclick="window.open('${msg.url}')">`;
        } else if(msg.type === 'poll') {
          bubble.innerHTML = renderPoll(msg);
        } else if(msg.type === 'system') {
          bubble.style.background = 'none'; bubble.style.border = 'none'; bubble.style.fontSize = '0.75rem'; bubble.style.color = 'var(--muted)';
          bubble.innerHTML = `<i>${msg.text}</i>`;
        }
        
        container.lastChild.appendChild(bubble);
        lastTime = msg.ts;
      });
      container.scrollTop = container.scrollHeight;
    });
  }

  window.sendMessage = async () => {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text && attachments.length === 0) return;
    
    if(slowModeActive && Date.now() < lastMessageTime + (slowModeSeconds * 1000)) {
      return alert(`Yavaş mod aktif! ${Math.ceil((lastMessageTime + (slowModeSeconds * 1000) - Date.now())/1000)}s beklemelisin.`);
    }

    if(text) {
      push(ref(db, `messages/${currentChannel}`), { type: 'text', text, author: currentUser, ts: serverTimestamp() });
    }
    
    for(let file of attachments) {
      const sRef = firebase.storage().ref(`uploads/${Date.now()}_${file.name}`);
      await sRef.put(file);
      const url = await sRef.getDownloadURL();
      push(ref(db, `messages/${currentChannel}`), { type: 'image', url, author: currentUser, ts: serverTimestamp() });
    }
    
    input.value = ''; input.style.height = 'auto';
    attachments = []; renderAttachments();
    lastMessageTime = Date.now();
  };

  // --- UTILS ---
  function formatText(t) { return t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent3)">$1</a>'); }
  function getColor(n){const c=['#7b5ea7','#3ecfcf','#f7c59f','#e8a0bf','#84dcc6','#a0c4ff','#ffd166','#ef476f'];let h=0;for(let x of n)h=(h*31+x.charCodeAt(0))%c.length;return c[h];}
  
  window.toggleEmojiPicker = () => document.getElementById('emojiPicker').classList.toggle('hidden');
  function initEmojiPicker() {
    const p = document.getElementById('emojiPicker');
    EMOJIS.forEach(e => {
      const span = document.createElement('span');
      span.className = 'emoji-item';
      span.textContent = e;
      span.onclick = () => { document.getElementById('msgInput').value += e; toggleEmojiPicker(); };
      p.appendChild(span);
    });
  }

  window.openBored = () => window.open(FUN_LINKS[Math.floor(Math.random()*FUN_LINKS.length)], '_blank');

  function setupInput() {
    const input = document.getElementById('msgInput');
    input.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  }

  listenChannels();
  switchChannel('genel', 'genel', 'Genel sohbet kanalı');
</script>

<!-- MODALS -->
<div class="modal-overlay hidden" id="addChannelModal">
  <div class="modal">
    <h3>Kanal Oluştur</h3>
    <input class="modal-input" id="newChannelName" placeholder="Kanal adı...">
    <input class="modal-input" id="newChannelDesc" placeholder="Açıklama...">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal('addChannelModal')">İptal</button>
      <button class="modal-btn primary" onclick="confirmAddChannel()">Oluştur</button>
    </div>
  </div>
</div>

<script>
  window.showModal = (id) => document.getElementById(id).classList.remove('hidden');
  window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
  window.confirmAddChannel = () => {
    const name = document.getElementById('newChannelName').value.trim();
    const desc = document.getElementById('newChannelDesc').value.trim();
    if(!name) return;
    const db = firebase.database();
    firebase.database().ref('channels').push({ name, desc });
    closeModal('addChannelModal');
  };
</script>

</body>
</html>
